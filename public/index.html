<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAS PLU App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #1a1a2e; font-size: 2rem; margin-bottom: 12px; }
    p { color: #555; font-size: 1rem; line-height: 1.6; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #4caf50;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SAS PLU App</h1>
    <p>Bienvenue sur l'application SAS PLU.<br />Le serveur est opérationnel et prêt.</p>
    <span class="badge">En ligne</span>
  </div>
</body>
</html>
